name: Publish Docker image

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build date (UTC, YYYYMMddHH)
        id: builddate
        run: echo "date=$(date -u +%Y%m%d%H)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=master
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.builddate.outputs.date }}

      - name: Trigger deploy webhook
        if: ${{ secrets.DEPLOY_WEBHOOK != '' }}
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
        run: |
          if [ -n "$DEPLOY_WEBHOOK_TOKEN" ]; then
            curl -fsSL -X GET "$WEBHOOK_URL" -H "Authorization: Bearer $DEPLOY_WEBHOOK_TOKEN"
          else
            curl -fsSL -X GET "$WEBHOOK_URL"
          fi
